name: CI

on:
  push:
    branches:
    - '**'
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore CipherVault.sln

    - name: Analyzer Gate (Core/Data/UI)
      run: |
        dotnet build CipherVault.Core/CipherVault.Core.csproj -c Release --no-restore /warnaserror
        dotnet build CipherVault.Data/CipherVault.Data.csproj -c Release --no-restore /warnaserror
        dotnet build CipherVault.UI/CipherVault.UI.csproj -c Release --no-restore /warnaserror

    - name: Build Solution
      run: dotnet build CipherVault.sln -c Release --no-restore

    - name: Test
      run: dotnet test CipherVault.sln -c Release --no-build --verbosity normal
