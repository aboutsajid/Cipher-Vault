name: Release Package

on:
  workflow_dispatch:
  push:
    tags:
    - 'v*'

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore CipherVault.sln

    - name: Publish Windows x64
      run: dotnet publish CipherVault.UI/CipherVault.UI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o artifacts/publish/win-x64

    - name: Create zip
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path artifacts/dist | Out-Null
        Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath artifacts/dist/CipherVault-win-x64.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CipherVault-win-x64
        path: artifacts/dist/CipherVault-win-x64.zip
